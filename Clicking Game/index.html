<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clicking Game</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="logo-container">
            <img src="images/mouse-logo.png" alt="Mouse icon">
            <h1>Clicker <span>Game</span> </h1>
        </div>
        <h3>Put your fingers to the test in this fast-paced clicking game!</h3>
        <div class="option-btn">
            <button class="ten">10s</button>
            <button class="twenty">20s</button>
            <button class="thirty">30s</button>
        </div>
        <div class="box-count">
            <h1 class="js-click-count">0</h1>
            <div class="timer">
                Time: <span class="js-timer">0</span>
            </div>
            <div class="click-box">
                <button class="click-me js-click-me">Click me as fast as you can!</button>
            </div>
        </div>
        <p class="copyright">Developed and programmed by Andrei De Jesus</p>
        
    </div>
    <div class="result">
        <button class="js-close-btn"><img class="close" src="svg/close.svg" alt="Close Icon"></button>
        <h2>Congratulations!</h2>
        <p>Your score: <span class="js-score"></span></p>
    </div>

    <div class="validation">
        <button class="js-close-valid-btn"><img class="close" src="svg/close.svg" alt="Close Icon"></button>
        <h2>Start the game by choosing a timer</h2>
    </div>

    <script src="script/main.js"></script>
</body>
</html>
