<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Contacts</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-title">
                <div class="logo-container">
                    <img src="svg/users.svg" alt="Users Icon">
                </div>
                <h1>My Contact List</h1>
            </div>
            <p>Search names in the list below.</p>
        </div>

        <div class="search-container">
            <div class="search-icon">
                <img src="svg/search.svg" alt="Search icon">
            </div>
            <div class="input-container">
                <input type="text" id="search" placeholder="Search names...">
            </div>
        </div>

        <div class="contact-container">
            <ul id="names" class="collection">
                <li class="collection-header">
                    <h3>A</h3>
                </li>
                <li class="collection-item">
                    <div class="user-icon">
                        <img src="svg/user.svg" alt="User icon">
                    </div>
                    <a href="#">Antonio Max</a>
                </li>
                <li class="collection-item">
                    <div class="user-icon">
                        <img src="svg/user.svg" alt="User icon">
                    </div>
                    <a href="#">Alex Garfield</a>
                </li>
                <li class="collection-item">
                    <div class="user-icon">
                        <img src="svg/user.svg" alt="User icon">
                    </div>
                    <a href="#">Anderson Hallway</a>
                </li>
                <li class="collection-header">
                    <h3>B</h3>
                </li>
                <li class="collection-item">
                    <div class="user-icon">
                        <img src="svg/user.svg" alt="User icon">
                    </div>
                    <a href="#">Bumble Bee</a>
                </li>
                <li class="collection-header">
                    <h3>C</h3>
                </li>
                <li class="collection-item">
                    <div class="user-icon">
                        <img src="svg/user.svg" alt="User icon">
                    </div>
                    <a href="#">Cinderella</a>
                </li>
                <li class="collection-header">
                    <h3>D</h3>
                </li>
                <li class="collection-item">
                    <div class="user-icon">
                        <img src="svg/user.svg" alt="User icon">
                    </div>
                    <a href="#">Daniel Padilla</a>
                </li>
                <li class="collection-item">
                    <div class="user-icon">
                        <img src="svg/user.svg" alt="User icon">
                    </div>
                    <a href="#">Dexter Joe</a>
                </li>
                <li class="collection-header">
                    <h3>E</h3>
                </li>
                <li class="collection-item">
                    <div class="user-icon">
                        <img src="svg/user.svg" alt="User icon">
                    </div>
                    <a href="#">Erwin Lopez</a>
                </li>
            </ul>
        </div>
    </div>

    <script src="script/main.js"></script>
</body>
</html>
