<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>ROCK PAPER SCISSORS</h1>
        <h2>Choose your weapon and defeat the computer!</h2>
        <div class="rps-btn">
            <button class="btn-rock js-btn-rock"><img src="images/Rock.png" alt="Rock icon"></button>
            <button class="btn-paper js-btn-paper"><img src="images/Paper.png" alt="Paper icon"></button>
            <button class="btn-scissor js-btn-scissor"><img src="images/Scissors.png" alt="Scissor icon"></button>
        </div>
        <p class="js-result"></p>
        <div class="js-move">
            <!-- Users and Comp Moves -->
        </div>
        <p class="score js-score"></p>
        <div class="additional-btn">
            <button class="btn-reset js-btn-reset">Reset Score</button>
            <button class="btn-auto-play js-btn-auto-play">Auto Play</button>
        </div>
    </div>

    <script src="script/main.js" type="module"></script>
</body>
</html>
