<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do List</title>
    <link rel="stylesheet" href="style/style.css">
</head>
<body>
    <div class="to-do-list-container" id="main-container">
        <div class="to-do-list-header">
            <h1>To Do List.</h1>
            <div class="to-do-list-inputs">
                <input class="todo-input js-to-do-input" type="text" placeholder="Add a new task...">
                <button class="add-btn js-add-btn">Add</button>
            </div>
        </div>

        <div class="to-do-list-items-container">
            <div class="to-do-list-items">
                <!-- To Do List items will be added here dynamically -->

                
            </div>
            <div class="to-do-list-items-empty js-to-do-list-items-empty">
                <p>You dont have a task yet...</p>
            </div>
        </div>

        <div class="toast-container">
            
        </div>
    </div>

    <div class="modal js-modal" id="modal">
        
    </div>

    <script src="js/script.js" type="module"></script>
</body>
</html>
